name: Java Maven CI/CD

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: my-java-app
  EKS_CLUSTER_NAME: my-eks-cluster

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Maven
        run: mvn clean install

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/my-java-app:$IMAGE_TAG .
          docker push $REGISTRY/my-java-app:$IMAGE_TAG

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --name my-eks-cluster \
          --region ap-south-2

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/java-app \
          java-app=${{ steps.login-ecr.outputs.registry }}/my-java-app:latest
