name: Java CD Pipeline

on:
  workflow_run:
    workflows: ["Java CI Pipeline"]
    types:
      - completed

env:
  AWS_REGION: ap-northeast-1
  EKS_CLUSTER_NAME: ips-cluster
  ECR_REPOSITORY: devops-app-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Run only if CI pipeline succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:

    ########################################
    # Checkout Repository
    ########################################
    - name: Checkout code
      uses: actions/checkout@v3

    ########################################
    # Configure AWS Credentials
    ########################################
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    ########################################
    # Install kubectl
    ########################################
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: latest

    ########################################
    # Connect to EKS Cluster
    ########################################
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $EKS_CLUSTER_NAME

    ########################################
    # Debug (Optional but useful)
    ########################################
    - name: Verify files
      run: |
        echo "Current directory:"
        pwd
        echo "Repo structure:"
        ls -R

    ########################################
    # Replace IMAGE in YAML (IMPORTANT)
    ########################################
    - name: Replace image in manifest
      run: |
        IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment-service.yaml

    ########################################
    # Deploy to Kubernetes
    ########################################
    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f k8s/deployment-service.yaml

    ########################################
    # Verify Deployment
    ########################################
    - name: Verify deployment
      run: |
        kubectl get pods
        kubectl get svc
